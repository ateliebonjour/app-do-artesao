<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2 - Data Grid com Scroll (Tabela Mobile)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: sans-serif; }
        /* Tabela rolável */
        .table-container {
            width: 100%;
            overflow-x: auto;
            position: relative;
            background: white;
            border-radius: 8px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            border: 1px solid #e5e7eb;
            /* Impede rolagem suave vertical acidental quando tentando horizontal */
            touch-action: pan-y;
        }
        /* Fixa a primeira coluna */
        th:first-child,
        td:first-child {
            position: sticky;
            left: 0;
            background-color: white;
            z-index: 10;
            border-right: 1px solid #e5e7eb;
            /* Sombra suave para indicar scroll */
            box-shadow: 2px 0 4px rgba(0,0,0,0.02);
            min-width: 120px;
        }
        /* Zebra-striping nas colunas sticky */
        tr:nth-child(even) td:first-child {
            background-color: #f9fafb;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 p-4 max-w-md mx-auto h-[800px] border-x border-dashed border-gray-300">
    <div class="mb-4 flex flex-col items-start gap-1">
        <h1 class="text-xl font-bold">Bolo Mousse</h1>
        <p class="text-xs font-semibold text-blue-600 bg-blue-50 px-2 py-0.5 rounded border border-blue-200">Visão Tabela (Deslize para os lados ▶)</p>
    </div>

    <!-- Container da Tabela com Scroll -->
    <div class="table-container text-sm">
        <table class="w-max min-w-full text-left whitespace-nowrap">
            <thead>
                <tr class="bg-gray-100 text-gray-600 font-semibold text-xs border-b border-gray-200">
                    <th class="py-2.5 px-3 uppercase tracking-wider">Ingrediente</th>
                    <th class="py-2.5 px-3 uppercase tracking-wider">Quant.</th>
                    <th class="py-2.5 px-3 uppercase tracking-wider">Un.</th>
                    <th class="py-2.5 px-3 uppercase tracking-wider text-right">Custo Est.</th>
                    <th class="py-2.5 px-3 uppercase tracking-wider text-center">Ação</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-gray-100">
                <tr class="hover:bg-gray-50 transition-colors">
                    <td class="py-2 px-3 font-medium text-gray-900 truncate max-w-[120px]">Cacau 70%</td>
                    <td class="py-2 px-3">
                        <input type="number" value="200" class="w-16 border border-gray-300 rounded px-1.5 py-1 text-center focus:ring-1 focus:ring-blue-500 focus:outline-none">
                    </td>
                    <td class="py-2 px-3 text-gray-500 text-xs">gramas</td>
                    <td class="py-2 px-3 text-right font-medium text-emerald-600">R$ 15,00</td>
                    <td class="py-2 px-3 text-center">
                        <button class="text-red-500 hover:text-red-700 font-bold px-2 py-1 bg-red-50 rounded text-xs">⨯</button>
                    </td>
                </tr>
                <tr class="bg-gray-50 hover:bg-gray-100 transition-colors">
                    <td class="py-2 px-3 font-medium text-gray-900 truncate max-w-[120px]">Leite Condens.</td>
                    <td class="py-2 px-3">
                        <input type="number" value="1" class="w-16 border border-blue-400 bg-blue-50 focus:bg-white rounded px-1.5 py-1 text-center focus:ring-1 focus:ring-blue-500 focus:outline-none">
                    </td>
                    <td class="py-2 px-3 text-gray-500 text-xs text-center border border-dashed border-gray-300 p-0 m-0 cursor-pointer bg-white" title="Clique para trocar">
                        und ▼
                    </td>
                    <td class="py-2 px-3 text-right font-medium text-emerald-600">R$ 8,50</td>
                    <td class="py-2 px-3 text-center">
                        <button class="text-red-500 hover:text-red-700 font-bold px-2 py-1 bg-red-50 rounded text-xs">⨯</button>
                    </td>
                </tr>
                <tr class="hover:bg-gray-50 transition-colors">
                    <td class="py-2 px-3 font-medium text-gray-900 truncate max-w-[120px]">Farinha de Trigo</td>
                    <td class="py-2 px-3">
                        <input type="number" value="150" class="w-16 border border-gray-300 rounded px-1.5 py-1 text-center focus:ring-1 focus:ring-blue-500 focus:outline-none">
                    </td>
                    <td class="py-2 px-3 text-gray-500 text-xs">gramas</td>
                    <td class="py-2 px-3 text-right font-medium text-emerald-600">R$ 1,20</td>
                    <td class="py-2 px-3 text-center">
                        <button class="text-red-500 hover:text-red-700 font-bold px-2 py-1 bg-red-50 rounded text-xs">⨯</button>
                    </td>
                </tr>
            </tbody>
        </table>
        <!-- Nova linha ghost/rápida -->
        <div class="px-3 py-2 border-t border-dashed border-gray-300 text-xs text-blue-600 font-semibold cursor-pointer hover:bg-gray-50">
            + Adicionar ingrediente vazio
        </div>
    </div>

    <!-- Custo Total Fixo -->
    <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 p-4 max-w-md mx-auto z-50">
        <div class="flex justify-between items-center text-sm font-bold">
            <span>Custo Total:</span>
            <span class="text-xl">R$ 24,70</span>
        </div>
    </div>
</body>
</html>
