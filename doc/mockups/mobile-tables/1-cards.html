<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1 - Mobile Cards (Híbrido)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Outfit', sans-serif; }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        amber: { 50: '#fffbeb', 100: '#fef3c7', 200: '#fde68a', 400: '#fbbf24', 500: '#f59e0b', 600: '#d97706', 700: '#b45309', 900: '#78350f' },
                        stone: { 50: '#fafaf9', 100: '#f5f5f4', 200: '#e7e5e4', 500: '#78716c', 800: '#292524', 900: '#1c1917' },
                        terracotta: { 50: '#fef5f2', 100: '#fcebe5', 200: '#fad1c2', 500: '#c05621', 600: '#9c4221', 700: '#7b341e' }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-[#fcfaf8] text-stone-800 p-4 pb-24 max-w-md mx-auto h-[800px] border-x border-dashed border-stone-200">
    <div class="mb-6 flex justify-between items-end">
        <div>
            <h1 class="text-2xl font-extrabold text-stone-900 tracking-tight mb-1">Bolo Mousse</h1>
            <p class="text-[11px] font-bold uppercase tracking-widest text-amber-600 bg-amber-50 px-2 py-0.5 rounded-lg inline-block border border-amber-100">Modo Card Expansível</p>
        </div>
        <button class="bg-amber-600 text-white px-3 py-2 rounded-xl text-sm font-bold shadow-md shadow-amber-600/20 hover:bg-amber-700 transition-colors">+ Add</button>
    </div>

    <!-- Lista em modo Card -->
    <div class="space-y-4">
        <!-- Card 1 -->
        <div class="bg-white p-5 rounded-3xl shadow-sm border border-stone-100 hover:border-amber-200 transition-colors">
            <div class="flex justify-between items-start mb-3">
                <h3 class="font-bold text-base text-stone-900">Cacau 70%</h3>
                <span class="text-[10px] font-bold text-stone-500 bg-stone-100 px-2.5 py-1 rounded-lg uppercase tracking-wide">Insumo</span>
            </div>
            <div class="grid grid-cols-2 gap-3 mb-4">
                <div class="bg-stone-50 p-3 rounded-2xl text-xs border border-stone-100">
                    <span class="block text-stone-400 font-bold uppercase tracking-wider mb-1 text-[10px]">Qtd. Receita</span>
                    <span class="font-extrabold text-stone-800 text-base">200 g</span>
                </div>
                <div class="bg-stone-50 p-3 rounded-2xl text-xs border border-stone-100">
                    <span class="block text-stone-400 font-bold uppercase tracking-wider mb-1 text-[10px]">Custo Calc.</span>
                    <span class="font-extrabold text-emerald-600 text-base">R$ 15,00</span>
                </div>
            </div>
            <!-- Simulação de Ação/Edição Expandida -->
            <button class="w-full border-2 border-stone-100 text-stone-600 font-bold text-xs py-2 rounded-xl hover:bg-stone-50 transition-colors bg-white">
                Editar Quantidade
            </button>
        </div>

        <!-- Card 2 (Edit Mode) -->
        <div class="bg-white p-5 rounded-3xl shadow-md border-2 border-amber-400 transition-colors relative overflow-hidden">
            <!-- Glow background -->
            <div class="absolute right-0 top-0 w-32 h-32 bg-gradient-to-br from-amber-50 to-white opacity-50 rounded-bl-full pointer-events-none"></div>
            
            <div class="flex justify-between items-start mb-3 relative z-10">
                <h3 class="font-bold text-base text-stone-900">Leite Condensado</h3>
                <span class="text-[10px] font-bold text-stone-500 bg-stone-100 px-2.5 py-1 rounded-lg uppercase tracking-wide">Insumo</span>
            </div>
            <div class="grid grid-cols-2 gap-3 mb-2 relative z-10">
                <div class="bg-amber-50 p-3 rounded-2xl text-xs border border-amber-100/50">
                    <span class="block text-amber-700/60 font-bold uppercase tracking-wider mb-1 text-[10px]">Qtd. Receita</span>
                    <span class="font-extrabold text-amber-900 text-base">1 und</span>
                </div>
                <div class="bg-stone-50 p-3 rounded-2xl text-xs border border-stone-100">
                    <span class="block text-stone-400 font-bold uppercase tracking-wider mb-1 text-[10px]">Custo Calc.</span>
                    <span class="font-extrabold text-emerald-600 text-base">R$ 8,50</span>
                </div>
            </div>
            <!-- Estado Editando (Expandido) -->
            <div class="mt-4 pt-4 border-t border-stone-100 space-y-3 relative z-10">
                <div class="flex gap-3">
                   <div class="flex-2 w-full">
                       <label class="text-[10px] text-stone-500 font-bold uppercase tracking-widest pl-1 mb-1 block">Quantidade</label>
                       <input type="number" value="1" class="w-full border-2 p-2 rounded-xl border-amber-400 focus:outline-none focus:ring-4 focus:ring-amber-100 bg-white font-bold text-base text-stone-800">
                   </div>
                   <div class="flex-1 min-w-[100px]">
                       <label class="text-[10px] text-stone-500 font-bold uppercase tracking-widest pl-1 mb-1 block">Und.</label>
                       <select class="w-full border-2 p-2 rounded-xl border-stone-200 text-sm font-bold bg-stone-50 text-stone-700 outline-none">
                           <option>und</option>
                           <option>g</option>
                       </select>
                   </div>
                </div>
                <div class="flex gap-2 pt-2">
                    <button class="bg-amber-600 text-white font-bold text-sm px-4 flex-1 py-3 rounded-xl shadow-md shadow-amber-600/20 hover:bg-amber-700">Salvar Modificação</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Custo Total Fixo -->
    <div class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t border-stone-200 p-5 max-w-md mx-auto shadow-[0_-4px_20px_-10px_rgba(0,0,0,0.1)]">
        <div class="flex justify-between items-center bg-stone-900 text-white rounded-2xl p-4 shadow-lg">
            <span class="text-xs font-bold uppercase tracking-widest text-stone-300">Custo Total Receita</span>
            <span class="text-2xl font-black">R$ 23,50</span>
        </div>
    </div>
</body>
</html>
