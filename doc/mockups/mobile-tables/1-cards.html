<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1 - Mobile Cards</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 p-4 max-w-md mx-auto h-[800px] border-x border-dashed border-gray-300">
    <div class="mb-4 flex justify-between items-end">
        <div>
            <h1 class="text-xl font-bold">Bolo Mousse</h1>
            <p class="text-xs text-gray-500">Cadastro de Receita (Modo Card)</p>
        </div>
        <button class="bg-black text-white px-3 py-1.5 rounded text-sm font-medium">+ Adicionar</button>
    </div>

    <!-- Lista em modo Card -->
    <div class="space-y-3">
        <!-- Card 1 -->
        <div class="bg-white p-4 rounded-lg shadow-sm border border-gray-200">
            <div class="flex justify-between items-start mb-2">
                <h3 class="font-semibold text-sm">Cacau 70%</h3>
                <span class="text-xs font-medium text-gray-500 bg-gray-100 px-2 py-0.5 rounded">Insumo</span>
            </div>
            <div class="grid grid-cols-2 gap-2 mb-3">
                <div class="bg-gray-50 p-2 rounded text-xs border border-gray-100">
                    <span class="block text-gray-500 mb-0.5">Quantidade</span>
                    <span class="font-medium">200 g</span>
                </div>
                <div class="bg-gray-50 p-2 rounded text-xs border border-gray-100">
                    <span class="block text-gray-500 mb-0.5">Custo Calc.</span>
                    <span class="font-medium text-emerald-600">R$ 15,00</span>
                </div>
            </div>
            <!-- Simulação de Ação/Edição Expandida -->
            <button class="w-full border border-gray-300 text-gray-700 text-xs py-1.5 rounded hover:bg-gray-50 transition-colors bg-white">
                Editar Valores
            </button>
        </div>

        <!-- Card 2 -->
        <div class="bg-white p-4 rounded-lg shadow-sm border border-gray-200">
            <div class="flex justify-between items-start mb-2">
                <h3 class="font-semibold text-sm">Leite Condensado (Lata)</h3>
                <span class="text-xs font-medium text-gray-500 bg-gray-100 px-2 py-0.5 rounded">Insumo</span>
            </div>
            <div class="grid grid-cols-2 gap-2 mb-3">
                <div class="bg-gray-50 p-2 rounded text-xs border border-gray-100">
                    <span class="block text-gray-500 mb-0.5">Quantidade</span>
                    <span class="font-medium">1 und</span>
                </div>
                <div class="bg-gray-50 p-2 rounded text-xs border border-gray-100">
                    <span class="block text-gray-500 mb-0.5">Custo Calc.</span>
                    <span class="font-medium text-emerald-600">R$ 8,50</span>
                </div>
            </div>
            <!-- Estado Editando (Expandido) -->
            <div class="mt-3 pt-3 border-t border-gray-100 space-y-2">
                <div class="flex gap-2">
                   <div class="flex-1">
                       <label class="text-[10px] text-gray-500 uppercase tracking-wide">Qtd</label>
                       <input type="number" value="1" class="w-full border p-1 border-blue-400 focus:outline-none focus:ring-1 focus:ring-blue-400 bg-blue-50 text-sm">
                   </div>
                   <div class="flex-1">
                       <label class="text-[10px] text-gray-500 uppercase tracking-wide">Und</label>
                       <select class="w-full border p-1 text-sm bg-white">
                           <option>und</option>
                           <option>g</option>
                       </select>
                   </div>
                </div>
                <div class="flex gap-2 pt-1">
                    <button class="bg-black text-white text-xs px-3 mx-auto w-full py-2 rounded">Salvar Alteração</button>
                </div>
            </div>
        </div>

    </div>

    <!-- Custo Total Fixo -->
    <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 p-4 max-w-md mx-auto">
        <div class="flex justify-between items-center text-sm font-bold">
            <span>Custo Total:</span>
            <span class="text-xl">R$ 23,50</span>
        </div>
    </div>
</body>
</html>
